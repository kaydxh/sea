log:
  formatter: glog
  level: info
  filepath: ./log
  max_age: 604800s #168h
  max_count: 200
  rotate_interval: 3600s
  rotate_size: 104857600
  report_caller: true
  redirct: stdout
web:
  bind_address:
    port: 10001
  grpc:
    timeout: 0s
  http:
    api_formatter: trivial_api_v20 # api_noop # tcloud_api_v30 # trivial_api_v10 # trivial_api_v20
  debug:
    enable_profiling: true
    disable_print_inoutput_methods: [""]

  # ========================================
  # OpenTelemetry 统一监控配置（去掉 monitor 包装层）
  # ========================================
  open_telemetry:
    enabled: true

    # ========================================
    # Global MeterProvider - 基础设施/运维指标
    # ========================================
    # 用途：CPU、内存、GC、gRPC 调用统计等
    # API：api.GlobalIncrCounter(), api.GlobalRecordHistogram()
    metric_collect_duration: 60s
    otel_metric_exporter_type: metric_prometheus  # 本地 Prometheus 拉取
    otel_metric_exporter:
      stdout:
        pretty_print: true
      prometheus:
        url: /metrics
      otlp:
        endpoint: ""
        token: ""
        protocol: "http"
        insecure: false
        url_path: "/v1/metrics"
        headers: {}

    # ========================================
    # App MeterProvider - 应用级/业务指标
    # ========================================
    # 用途：订单数、用户注册、业务延迟等
    # API：api.IncrCounter(), api.RecordHistogram()
    app_meter_provider:
      enabled: true                       # 启用 App Provider
      exporter_type: metric_otlp          # 推送到远程 OTLP
      collect_duration: 30s               # 业务指标采集周期更短
      exporter:
        otlp:
          endpoint: "ap-guangzhou.tencentcloudapi.com:4317"  # 腾讯云 Prometheus 地址（按实际地域修改）
          token: "your-token-here"        # 认证 Token（从腾讯云控制台获取）
          protocol: "grpc"
          insecure: true                  # 禁用 TLS（如果服务端不支持 TLS）
          url_path: "/v1/metrics"
          headers: {}
      resource:
        service_name: "sea-date"          # 业务指标服务名
        attrs:
          metric_type: "business"

    # ========================================
    # Trace 配置
    # ========================================
    otel_trace_exporter_type: trace_stdout
    otel_log_exporter_type: log_none
    otel_trace_exporter:
      stdout:
        pretty_print: true
      jaeger:
        url: http://localhost:14268/api/traces
      otlp:
        endpoint: ""
        token: ""
        protocol: "grpc"
        insecure: false
        url_path: "/v1/traces"
        headers: {}

    # ========================================
    # 通用资源配置
    # ========================================
    resource:
      service_name: ""
      service_version: ""
      attrs: {}
      k8s:
        enabled: true

    # 兼容旧 monitor.prometheus 配置
    enabled_metric_timer_cost: false
    enabled_metric_code_message: true

  # QPS限流配置
  qps_limit:
    # gRPC QPS限流配置
    grpc:
      default_qps: 0        # 默认QPS，0表示不限制
      default_burst: 0      # 默认突发容量，0表示使用default_qps值
      max_concurrency: 10   # 最大并发数限制，0表示不限制
      method_qps: []        # 方法级配置示例：
      # - method: "/seadate.v1.SeaDateService/Now"
      #   qps: 100
      #   burst: 150
      #   max_concurrency: 50
    # HTTP QPS限流配置
    http:
      default_qps: 0        # 默认QPS，0表示不限制
      default_burst: 0      # 默认突发容量
      max_concurrency: 10   # 最大并发数限制，0表示不限制
      method_qps: []        # 路径级配置示例：
      # - method: "/v1/now"
      #   qps: 100
      #   burst: 150
      #   max_concurrency: 50
resolver:
  enabled: true
  resolve_interval: 10s
  reslover_type: reslover_type_dns
  load_balance_mode: load_balance_mode_consist
  domains: []
database:
  mysql:
    enabled: false 
    address: "localhost:3306"
    username: "root"
    password: ""
    db_name: "sealet"
    max_connections: 100
    max_idle_connections: 10
    dial_timeout: 5s
    max_wait_duration: 20s
    fail_after_duration: 60s
    interpolate_params: true
  redis:
    enabled:  false 
    addresses: 
      - "localhost:6380"
    password: "password"
    db: 0 
    max_connections: 100
    max_idle_connections: 10
    dial_timeout: 5s
    max_wait_duration: 20s
    fail_after_duration: 300s
debug:
   dump:
     enabled: false
     dump_dir: "./debug/dump"
   

