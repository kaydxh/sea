log:
  formatter: glog
  level: info
  filepath: ./log
  max_age: 604800s #168h
  max_count: 200
  rotate_interval: 3600s
  rotate_size: 104857600
  report_caller: true
  redirct: stdout
web:
  bind_address:
    port: 10001
  grpc:
    timeout: 0s
  http:
    api_formatter: trivial_api_v20 # api_noop # tcloud_api_v30 # trivial_api_v10 # trivial_api_v20
  debug:
    enable_profiling: true
    disable_print_inoutput_methods: [""]
  monitor:
    prometheus:
      enabled_metric_timer_cost: false
      enabled_metric_code_message: true
    open_telemetry:
      enabled: true
      metric_collect_duration: 60s
      otel_trace_exporter_type : trace_stdout
      otel_metric_exporter_type : metric_stdout
      otel_log_exporter_type : log_none
      otel_metric_exporter :
        stdout:
          pretty_print: true
        prometheus:
          url: noop://localhost/metrics
      otel_trace_exporter:
        stdout:
          pretty_print: true
        jaeger:
          url: http://localhost:14268/api/trace
      resource:
  # QPS限流配置
  qps_limit:
    # gRPC QPS限流配置
    grpc:
      default_qps: 0        # 默认QPS，0表示不限制
      default_burst: 0      # 默认突发容量，0表示使用default_qps值
      max_concurrency: 10   # 最大并发数限制，0表示不限制
      method_qps: []        # 方法级配置示例：
      # - method: "/seadate.v1.SeaDateService/Now"
      #   qps: 100
      #   burst: 150
      #   max_concurrency: 50
    # HTTP QPS限流配置
    http:
      default_qps: 0        # 默认QPS，0表示不限制
      default_burst: 0      # 默认突发容量
      max_concurrency: 10   # 最大并发数限制，0表示不限制
      method_qps: []        # 路径级配置示例：
      # - method: "/v1/now"
      #   qps: 100
      #   burst: 150
      #   max_concurrency: 50
resolver:
  enabled: true
  resolve_interval: 10s
  reslover_type: reslover_type_dns
  load_balance_mode: load_balance_mode_consist
  domains: []
database:
  mysql:
    enabled: false 
    address: "localhost:3306"
    username: "root"
    password: ""
    db_name: "sealet"
    max_connections: 100
    max_idle_connections: 10
    dial_timeout: 5s
    max_wait_duration: 20s
    fail_after_duration: 60s
    interpolate_params: true
  redis:
    enabled:  false 
    addresses: 
      - "localhost:6380"
    password: "password"
    db: 0 
    max_connections: 100
    max_idle_connections: 10
    dial_timeout: 5s
    max_wait_duration: 20s
    fail_after_duration: 300s
debug:
   dump:
     enabled: false
     dump_dir: "./debug/dump"
   

