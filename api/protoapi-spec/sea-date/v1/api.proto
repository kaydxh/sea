syntax = "proto3";

package sea.api.seadate;

import "google/api/annotations.proto";

option go_package = "github.com/kaydxh/sea/api/protoapi-spec/sea-date/v1;v1";

service SeaDateService {
  // 获取当前时间
  rpc Now(NowRequest) returns (NowResponse) {
    option (google.api.http) = {
      post: "/api/now"
      body: "*"
    };
  };

  // 获取当前时间（模拟错误场景）
  rpc NowError(NowErrorRequest) returns (NowErrorResponse) {
    option (google.api.http) = {
      post: "/api/now_error"
      body: "*"
    };
  };
}

// 获取当前时间请求
message NowRequest {
  // 请求ID
  string request_id = 1 [json_name = "RequestId"];
}

// 获取当前时间响应
message NowResponse {
  // 错误码（0 表示成功）
  int32 code = 1 [json_name = "Code"];
  // 错误信息
  string message = 2 [json_name = "Message"];
  // 当前时间
  string date = 3 [json_name = "Date"];
}

// 获取当前时间（模拟错误）请求
message NowErrorRequest {
  // 请求ID
  string request_id = 1 [json_name = "RequestId"];
}

// 获取当前时间（模拟错误）响应
message NowErrorResponse {
  // 错误码（0 表示成功）
  int32 code = 1 [json_name = "Code"];
  // 错误信息
  string message = 2 [json_name = "Message"];
  // 当前时间
  string date = 3 [json_name = "Date"];
}